name: BDD Tests - Serenity/JS + Cucumber + Playwright

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Ejecutar pruebas BDD
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegador Chromium
        run: npx playwright install --with-deps chromium

      - name: Ejecutar pruebas BDD (Cucumber + Serenity/JS)
        run: npm test
        env:
          HEADLESS: true
          USUARIO_VALIDO: ${{ secrets.USUARIO_VALIDO }}
          CONTRASENA_VALIDA: ${{ secrets.CONTRASENA_VALIDA }}

      - name: Generar Reporte Serenity BDD
        if: always()
        run: npm run report

      - name: Subir reporte Cucumber
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: reports/
          retention-days: 30

      - name: Subir reporte Serenity BDD
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-bdd-report
          path: target/site/serenity/
          retention-days: 30
